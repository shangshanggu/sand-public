  - pip
  - r-base=4.3.2
  - r-essentials=4.3
  - r-tidyverse=2.0.0
  - r-data.table=1.14.10
  - r-lubridate=1.9.3
  - r-stringr=1.5.1
  - r-readr=2.1.4
  - r-purrr=1.0.2
  - r-broom=1.0.5
  - r-cowplot=1.1.3
  - r-gridextra=2.3
  - r-irkernel=1.3.2
  - r-igraph=1.5.1
  - r-network=1.19.0
  - r-visnetwork=2.1.4
  - r-magick=2.8.3
  - r-digest=0.6.37
  - r-jsonlite=1.8.8
  - r-glue=1.7.0
  - r-yaml=2.3.8
  - r-cli=3.6.2
  - r-dplyr=1.1.4
  - r-tidyr=1.3.0
  - r-readxl=1.4.3
  - r-openxlsx=4.2.5.2
  - r-httr=1.4.7
  - r-rcpp=1.0.11
  - r-xml2=1.3.6
  - r-devtools=2.4.5
  - r-remotes=2.5.0
  - r-testthat=3.2.1
  - r-covr=3.6.4
  - r-knitr=1.45
  - r-rmarkdown=2.25
  - r-renv=1.0.7
  - gsl=2.7
  - libxml2=2.12.5
  - libgit2=1.7.2
  - libcurl=8.5.0
  - make
  - pkg-config
  - pandoc=3.1.12
  - jupyterlab=4.1.5
  # Optional animation packages are outside the verified Chapters 4-6 fast path
  # and the partial Chapter 7 diagnostic, and
  # are not available reliably from conda-forge. Install them from CRAN only if
  # running scripts/visualisation/04_animate_microsteps.R:
  #   Rscript -e 'install.packages(c("networkDynamic", "ndtv"), repos="https://cloud.r-project.org")'
  - pip:
      - pre-commit==3.6.2
      - ruff==0.3.0
      - black==24.2.0
      - mypy==1.8.0
      - quarto-cli==1.4.553
