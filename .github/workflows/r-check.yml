name: R-CI

on:
  push:
    paths-ignore:
      - '**/*.md'
  pull_request:

permissions:
  contents: read

concurrency:
  group: r-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4
        with:
          activate-environment: r_stable
          environment-file: reproduced/environment.yml
          conda-solver: libmamba
          auto-update-conda: true
          auto-activate: false

      - name: Export Conda path for Makefile
        run: |
          echo "CONDA=$(conda info --base)/bin/conda" >> "$GITHUB_ENV"

      - name: Verify Conda installation
        run: |
          which conda
          conda --version
          echo "Using CONDA executable at: $CONDA"

      - name: Install system deps
        run: |
          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cache renv packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/R/renv
          key: ${{ runner.os }}-renv-${{ hashFiles('reproduced/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Restore locked R library
        run: |
          make -C reproduced env-renv
          make -C reproduced rsiena
          cd reproduced
          conda run -n r_stable Rscript -e 'stopifnot(isTRUE(renv::status()$synchronized), as.character(packageVersion("RSiena")) == "1.4.7")'

      - name: Verify reproduction environment
        run: |
          conda run -n r_stable Rscript --version
          conda run -n r_stable python --version

      - name: Run fast tests
        run: |
          make -C reproduced DATA_MODE=proxy check

      - name: Reproduce and verify proxy Chapters 4-6
        run: |
          make -C reproduced DATA_MODE=proxy verify-proxy-quick

      - name: Upload reproduction logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reproduction-logs
          path: reproduced/logs
          if-no-files-found: warn

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verification-reports
          path: |
            reproduced/outputs/verify
          if-no-files-found: warn
